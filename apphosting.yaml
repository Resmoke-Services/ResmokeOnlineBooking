# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# These variables are injected into the backend environment for your Next.js app.
env:
  # Grant access to secrets in Cloud Secret Manager.
  # Before deploying, you must create these secrets in Google Cloud Secret Manager.
  # See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
  - variable: APP_FIREBASE_ADMIN_CREDENTIALS
    secret: APP_FIREBASE_ADMIN_CREDENTIALS
    availability:
      - BUILD
      - RUNTIME
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_CONFIG
    secret: FIREBASE_CONFIG
    availability:
      - BUILD
      - RUNTIME
