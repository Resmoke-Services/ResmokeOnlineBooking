# This file configures the settings for your Firebase App Hosting backend.
# It controls the server environment (Cloud Run) and how secrets are managed.

runConfig:
# Setting minInstances to 0 is cost-effective as it allows the service
# to scale down to zero when there's no traffic.
minInstances: 0

# "env" defines environment variables for your backend.
# We are securely loading these from Google Cloud Secret Manager.
env:
# This block explicitly defines an environment variable named
# 'APP_FIREBASE_ADMIN_CREDENTIALS' and tells it to get its value from
# the secret with the same name in Secret Manager.
- variable: APP_FIREBASE_ADMIN_CREDENTIALS
secret: APP_FIREBASE_ADMIN_CREDENTIALS
availability:
- BUILD
- RUNTIME

# Explicitly define the GEMINI_API_KEY environment variable.
- variable: GEMINI_API_KEY
secret: GEMINI_API_KEY
availability:
- BUILD
- RUNTIME

# Explicitly define the FIREBASE_CONFIG environment variable.
# This now correctly points to the 'FIREBASE_CONFIG' secret.
- variable: FIREBASE_CONFIG
secret: FIREBASE_CONFIG
availability:
- BUILD
- RUNTIME